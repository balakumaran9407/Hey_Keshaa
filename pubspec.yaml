name: hey_keshaa
description: Smart Hair Health Diagnostic App with IoT Integration
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  
  # Google Sign-In
  google_sign_in: ^6.2.2
  
  # State Management
  provider: ^6.1.2
  
  # Local Storage
  shared_preferences: ^2.3.4
  
  # Bluetooth
  flutter_blue_plus: ^1.32.12
  permission_handler: ^11.3.1
  
  # Charts
  fl_chart: ^0.69.0
  
  # UI & Icons
  cupertino_icons: ^1.0.8
  
  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
